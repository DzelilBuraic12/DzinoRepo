<div class="contact-page page-enter">

  <section class="contact-hero">
    <div class="container">
      <div class="hero-badge">✉️ Javite nam se</div>
      <h1>Kontaktirajte <span class="highlight">nas</span></h1>
      <p>Tu smo za sva vaša pitanja i prijedloge — odgovaramo brzo!</p>
    </div>
  </section>

  <section class="contact-content">
    <div class="container">
      <div class="contact-grid">

        <div class="contact-info">
          <h2>Informacije</h2>

          <div class="info-item">
            <div class="info-icon">📞</div>
            <div>
              <h4>Telefon</h4>
              <p><a href="tel:+387032616000">+387 032 616-000</a></p>
            </div>
          </div>

          <div class="info-item">
            <div class="info-icon">✉️</div>
            <div>
              <h4>Email</h4>
              <p><a href="mailto:dzinobpm@bih.net.ba">dzinobpm@bih.net.ba</a></p>
            </div>
          </div>

          <div class="info-item">
            <div class="info-icon">🕐</div>
            <div>
              <h4>Radno vrijeme</h4>
              <p>Pon — Ned: <strong>0 — 24</strong></p>              
            </div>
          </div>
        </div>

        <div class="contact-form-wrapper">
          <h2>Pošaljite poruku</h2>
          <form class="contact-form">
            <div class="form-group">
              <label for="name">Ime i prezime</label>
              <input type="text" id="name" placeholder="Vaše ime...">
            </div>
            <div class="form-group">
              <label for="email">Email adresa</label>
              <input type="email" id="email" placeholder="vas@email.com">
            </div>
            <div class="form-group">
              <label for="phone">Telefon (opcionalno)</label>
              <input type="tel" id="phone" placeholder="+387 00 000 000">
            </div>
            <div class="form-group">
              <label for="message">Poruka</label>
              <textarea id="message" rows="5" placeholder="Vaša poruka..."></textarea>
            </div>
            <button type="submit" class="submit-btn">📨 Pošalji poruku</button>
          </form>
        </div>

      </div>
    </div>
  </section>

</div>
